cli:
  name: "fflow"
  description: "Утилита для работы с файлами и документами"
  long: |
    fflow - мощная утилита для конвейерной работы с файлами и документами
    
    Доступные команды:
      flow    - Потоковая (конвейерная) обработка файлов
      stats   - Подсчет статистики по файлам
      info    - Подробная информация о директории
      merge   - Слияние нескольких файлов в один
      pdf     - Генерация PDF из файлов
      copy    - Копирование файлов по фильтрам
      move    - Перемещение файлов по фильтрам
      delete  - Удаление выбранных файлов
      rename  - Массовое переименование файлов
      ext     - Массовое изменение расширения
      zip     - Создание ZIP архива из файлов
      cmd     - Выполнение скриптов над файлами
      locale  - Установка языка интерфейса
    
    Используйте "fflow [command] --help" для получения подробной информации.

cobra:
  usage: "Использование"
  available_commands: "Доступные команды"
  flags: "Флаги"
  global_flags: "Глобальные флаги"
  help_info: 'Используйте "fflow [command] --help" для получения подробной информации о команде.'

commands:
  help:
    short: "Справка по любой команде"
    long: "Выводит справочную информацию о любой указанной команде."
  flow:
    short: "Потоковая обработка файлов (Pipeline)"
    long: "Пропускает отфильтрованные файлы через цепочку действий (copy, move, zip, rename и т.д.) с мутацией состояния. Может читать сценарий из YAML или из аргумента --cmd."
  stats:
    short: "Подсчет статистики по файлам"
    long: "Собирает информацию о количестве строк, слов, символов и байт в файлах."
  info:
    short: "Отображает подробную информацию о директории"
    long: "Собирает список всех файлов в директории, выводит метаданные и общую статистику."
  merge:
    short: "Слияние файлов в один"
    long: "Слияние нескольких файлов в один с возможностью добавления заголовков и разделителей."
  pdf:
    short: "Генерация PDF из файлов"
    long: "Генерация единого PDF документа из различных файлов с поддержкой форматирования."
  copy:
    short: "Копирует файлы"
    long: "Выполняет поиск файлов по фильтрам и безопасно копирует их в целевые директории."
  move:
    short: "Перемещает файлы"
    long: "Выполняет поиск файлов по фильтрам и перемещает их."
  delete:
    short: "Удаление файлов"
    long: "Удаляет файлы и директории, подходящие под заданные фильтры поиска."
  rename:
    short: "Переименование файлов"
    long: "Массовое переименование файлов с помощью поиска, замены, префиксов и суффиксов."
  ext:
    short: "Изменение расширения файлов"
    long: "Массово изменяет расширение отфильтрованных файлов на указанное."
  zip:
    short: "Создание ZIP архива"
    long: "Собирает отфильтрованные файлы в единый ZIP архив."
  cmd:
    short: "Выполнение shell скрипта"
    long: "Выполняет системную команду для каждого найденного файла. Используйте {} для подстановки пути."
  locale:
    short: "Установка языка интерфейса"
    long: "Смена языка интерфейса CLI (поддерживаются ru и en)."
  telemetry:
    short: "Управление сбором и отправкой метрик"
    long: "Позволяет включить/выключить сбор анонимной телеметрии или принудительно отправить данные."
    telemetry_on:
      short: "Включить сбор анонимной телеметрии"
    telemetry_off:
      short: "Отключить сбор телеметрии"
    telemetry_push:
      short: "Отправить накопленные метрики на сервер"


